<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TXTeditor</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div id="app" class="shell">
      <aside class="activity" aria-label="Activity" data-i18n-aria-label="aria.activity">
        <button class="activity-button active" data-command="show-explorer" data-i18n-title="activity.explorer" title="Explorer">E</button>
        <button class="activity-button" data-command="show-problems" data-i18n-title="activity.problems" title="Problems">P</button>
      </aside>

      <div id="layoutRoot" class="layout-root">
        <section id="dockTop" class="dock dock-top" data-dock-edge="top" aria-label="Top dock" data-i18n-aria-label="aria.topDock"></section>

        <section id="dockLeft" class="dock dock-left" data-dock-edge="left" aria-label="Left dock" data-i18n-aria-label="aria.leftDock">
          <aside id="sidebar" class="sidebar" aria-label="Workspace" data-i18n-aria-label="aria.workspace" data-dock-panel="explorer">
            <div id="sidebarResizer" class="sidebar-resizer pane-resizer" aria-hidden="true"></div>
            <header class="sidebar-header" data-i18n="app.title">TXTeditor</header>
            <div class="sidebar-actions">
              <button data-command="open-file" data-i18n="toolbar.openFile">Open File</button>
              <button data-command="open-folder" data-i18n="toolbar.openFolder">Open Folder</button>
            </div>
            <div class="sidebar-search">
              <span class="sidebar-search-icon" aria-hidden="true"></span>
              <input id="explorerFilter" class="sidebar-filter" type="search" data-i18n-placeholder="explorer.search" data-i18n-aria-label="explorer.search" placeholder="Search file" aria-label="Search file" autocomplete="off" spellcheck="false" />
              <div id="explorerSearchResults" class="sidebar-search-results hidden" role="listbox" aria-label="Matching files" data-i18n-aria-label="aria.matchingFiles"></div>
            </div>
            <div id="fileList" class="file-list"></div>
          </aside>
        </section>

        <main class="main">
          <div id="tabs" class="tabs"></div>
          <section class="toolbar">
            <button data-command="open-file" data-i18n="toolbar.open">Open</button>
            <button data-command="save-file" data-i18n="toolbar.save">Save</button>
            <button data-command="save-as" data-i18n="toolbar.saveAs">Save As</button>
            <button data-command="close-all" data-i18n="toolbar.closeAll" disabled>Close All</button>
            <button data-command="undo" data-i18n="toolbar.undo">Undo</button>
            <button data-command="redo" data-i18n="toolbar.redo">Redo</button>
            <button data-command="search" data-i18n="toolbar.find">Find</button>
            <button class="toggle-button" data-command="toggle-freeze-row" data-i18n="toolbar.freezeRow">Freeze Row</button>
            <button class="toggle-button" data-command="toggle-freeze-column" data-i18n="toolbar.freezeColumn">Freeze Column</button>
            <button data-command="open-shortcut-settings" data-i18n="toolbar.shortcuts">Shortcuts</button>
            <button data-command="open-app-settings" data-i18n="toolbar.settings">Settings</button>
          </section>
          <section id="cellInputBar" class="cell-input-bar hidden" aria-label="Active cell input" data-i18n-aria-label="cellInput.aria">
            <output id="cellInputAddress" class="cell-input-address" aria-live="polite"></output>
            <div class="cell-input-field">
              <input id="cellInput" class="cell-input" type="text" autocomplete="off" spellcheck="false" aria-label="Cell value" data-i18n-aria-label="cellInput.value" />
              <canvas id="cellInputDiagnostics" class="cell-input-diagnostics" aria-hidden="true"></canvas>
            </div>
            <output id="cellInputCount" class="cell-input-count hidden" aria-live="polite"></output>
          </section>
          <section id="gridHost" class="grid-host editor-surface" tabindex="0" aria-label="Virtual table editor" data-i18n-aria-label="aria.tableEditor">
            <canvas id="gridCanvas"></canvas>
            <canvas id="frozenCanvas"></canvas>
            <div id="scrollSurface" class="scroll-surface"></div>
            <input id="cellEditor" class="cell-editor" autocomplete="off" spellcheck="false" />
            <div id="emptyState" class="empty-state" data-i18n="empty.open">Open a file or folder to begin</div>
            <div id="overviewRuler" class="overview-ruler"></div>
          </section>
          <section id="jsonEditorHost" class="json-editor-host editor-surface hidden" aria-label="JSON code editor" data-i18n-aria-label="aria.jsonEditor"></section>
        </main>

        <section id="dockRight" class="dock dock-right" data-dock-edge="right" aria-label="Right dock" data-i18n-aria-label="aria.rightDock"></section>

        <section id="dockBottom" class="dock dock-bottom" data-dock-edge="bottom" aria-label="Bottom dock" data-i18n-aria-label="aria.bottomDock">
          <section id="problemsPanel" class="problems-panel hidden" aria-label="Problems" data-i18n-aria-label="activity.problems" data-dock-panel="problems">
            <div id="problemsResizer" class="problems-resizer pane-resizer" aria-hidden="true"></div>
            <header class="problems-header">
              <div class="bottom-tabs">
                <button class="bottom-tab active" data-bottom-tab="problems"><span data-i18n="activity.problems">Problems</span> <span id="lintSummary" class="lint-summary"></span></button>
                <button class="bottom-tab" data-bottom-tab="log" data-i18n="problems.log">Log</button>
              </div>
              <div id="lintControls" class="lint-controls"></div>
            </header>
            <div id="lintRulesPanel" class="lint-rules-panel hidden" aria-label="Lint rules" data-i18n-aria-label="lint.rules"></div>
            <div id="problemsList" class="problems-list"></div>
            <div id="logList" class="log-list hidden"></div>
          </section>
        </section>
      </div>
    </div>

    <div id="searchPanel" class="modal-backdrop search-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="searchTitle">
      <div class="modal search-modal">
        <h2 id="searchTitle" data-search-drag-handle data-i18n="search.title">Find</h2>
        <input id="searchInput" class="modal-input" type="search" data-i18n-placeholder="search.placeholder" placeholder="Search in current table" autocomplete="off" spellcheck="false" />
        <div id="searchReplaceRow" class="search-replace-row hidden">
          <label for="searchReplaceInput" data-i18n="search.replaceWith">Replace with</label>
          <input id="searchReplaceInput" class="modal-input" type="text" autocomplete="off" spellcheck="false" />
        </div>
        <fieldset class="search-scope" aria-label="Search scope" data-i18n-aria-label="search.scope">
          <label><input type="radio" name="searchScope" value="all" checked /> <span data-i18n="search.allCells">All cells</span></label>
          <label><input type="radio" name="searchScope" value="column-titles" /> <span data-i18n="search.columnOnly">Column only</span></label>
          <label><input type="radio" name="searchScope" value="row-titles" /> <span data-i18n="search.rowOnly">Row only</span></label>
        </fieldset>
        <div id="searchStatus" class="search-status"></div>
        <div id="searchReplaceActions" class="modal-actions search-replace-actions hidden">
          <button data-search-replace data-i18n="search.replace">Replace</button>
          <button data-search-replace-all data-i18n="search.replaceAll">Replace All</button>
        </div>
        <div class="modal-actions">
          <button data-search-previous aria-keyshortcuts="Shift+Enter" data-i18n="search.previous">Find Prev</button>
          <button data-command="find-next" aria-keyshortcuts="Enter" data-i18n="search.next">Find Next</button>
          <button data-search-close data-i18n="common.close">Close</button>
        </div>
      </div>
    </div>

    <div id="palette" class="palette hidden">
      <input id="paletteInput" data-i18n-placeholder="palette.placeholder" placeholder="Type a command" />
      <div id="paletteResults" class="palette-results"></div>
    </div>

    <div id="toast" class="toast hidden"></div>
    <div id="contextMenu" class="context-menu hidden"></div>
    <div id="closeDialog" class="modal-backdrop hidden">
      <div class="modal">
        <h2 data-i18n="dialog.saveChanges">Save changes?</h2>
        <p id="closeDialogText" data-i18n="dialog.unsavedChanges">This file has unsaved changes.</p>
        <div class="modal-actions">
          <button data-close-choice="save" data-i18n="toolbar.save">Save</button>
          <button data-close-choice="discard" data-i18n="dialog.dontSave">Don't Save</button>
          <button data-close-choice="cancel" data-i18n="common.cancel">Cancel</button>
        </div>
      </div>
    </div>

    <div id="externalChangeDialog" class="modal-backdrop hidden">
      <div class="modal">
        <h2 data-i18n="dialog.externalChanged">File changed outside TXTeditor</h2>
        <p id="externalChangeDialogText" data-i18n="dialog.jsonChanged">This JSON file changed on disk.</p>
        <div class="modal-actions">
          <button data-external-change-choice="reload" data-i18n="dialog.reload">Reload</button>
          <button data-external-change-choice="keep" data-i18n="dialog.keepChanges">Keep My Changes</button>
        </div>
      </div>
    </div>

    <input id="hiddenFileInput" type="file" accept=".txt,.tsv,.tbl,.csv,text/plain" hidden />
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
